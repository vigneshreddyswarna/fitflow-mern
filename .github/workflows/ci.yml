name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/fitflow-ci
      INTEGRATION_MONGODB_URI: mongodb://127.0.0.1:27017/fitflow-integration-ci
      JWT_SECRET: ci-secret-with-enough-length
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Enforce coverage thresholds
        run: pnpm test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 7

      - name: Lint
        run: pnpm lint

      - name: Build frontend
        run: pnpm build

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: pnpm test:e2e

      - name: Upload browser failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-traces
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
